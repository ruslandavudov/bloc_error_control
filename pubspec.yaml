name: bloc_error_control
description: Declarative error handling for BLoC with Zones and optional code generation
version: 1.0.1
repository: https://github.com/ruslandavudov/bloc_error_control
issue_tracker: https://github.com/ruslandavudov/bloc_error_control/issues

environment:
  sdk: ^3.9.2
  flutter: ">=1.17.0"

dependencies:
  analyzer: ^6.4.1
  build: ^2.4.1
  flutter:
    sdk: flutter
  flutter_bloc: '>=8.1.6 <10.0.0'
  meta: ^1.10.0
  source_gen: ^1.5.0

dev_dependencies:
  benchmark_harness: ^2.2.0
  bloc: '>=8.0.0 <10.0.0'
  bloc_concurrency: ^0.2.5
  bloc_test: ^9.1.0
  build_runner: ^2.4.0
  dio: ^5.0.0
  equatable: ^2.0.7
  flutter_lints: ^6.0.0
  rxdart: ^0.28.0
  test: ^1.24.0

topics:
  - bloc
  - error-handling
  - flutter
  - code-generation

