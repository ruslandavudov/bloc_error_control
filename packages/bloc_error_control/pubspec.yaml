name: bloc_error_control
description: Declarative error handling for BLoC with Zones and optional code generation
version: 1.1.0
repository: https://github.com/ruslandavudov/bloc_error_control
issue_tracker: https://github.com/ruslandavudov/bloc_error_control/issues

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter_bloc: ^9.1.1
  meta: ^1.11.0

dev_dependencies:
  bloc_concurrency: ^0.3.0
  bloc_test: ^10.0.0
  dio: ^5.9.0
  flutter_test:
    sdk: flutter
  rxdart: ^0.28.0

topics:
  - bloc
  - error-handling
  - flutter
  - code-generation
